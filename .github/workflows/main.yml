
name: OpenClaw Demo CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js using apt-get
      run: |
        curl -sL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs
    
    - name: Verify Node.js installation
      run: |
        node -v
        npm -v
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build --if-present
    
    - name: Test
      run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4.6.3
      with:
        branch: gh-pages
        folder: build

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    
    steps:
    - name: Send notification
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const buildResult = '${{ needs.build.result }}';
          const deployResult = '${{ needs.deploy.result }}';
          
          console.log('Build result:', buildResult);
          console.log('Deploy result:', deployResult);
          
          if (buildResult === 'success' && deployResult === 'success') {
            console.log('🎉 CI/CD pipeline executed successfully!');
          } else {
            console.log('⚠️ CI/CD pipeline completed with issues');
          }
